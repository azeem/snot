<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>snot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://cdn.jsdelivr.net/npm/mithril@2/mithril.min.js"></script>
  <style>
    body {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem;
      padding-top: 5rem;
    }

    #pairs {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .pair {
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.5rem;
      overflow: hidden;
    }

    .pair-command {
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      color: var(--pico-muted-color);
      border-bottom: 1px solid var(--pico-muted-border-color);
      background: var(--pico-card-sectioning-background-color);
    }

    .pair-response {
      padding: 0.5rem 0.75rem;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
    }

    #input-row {
      display: flex;
      gap: 0.5rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      max-width: 720px;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      background: var(--pico-background-color);
      border-bottom: 1px solid var(--pico-muted-border-color);
    }

    #input-row input {
      flex: 1;
      margin: 0;
    }

    #input-row button {
      margin: 0;
      width: auto;
    }

    #input-wrapper {
      flex: 1;
      position: relative;
    }

    #input-wrapper input {
      width: 100%;
    }

    #autocomplete {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--pico-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.5rem;
      overflow: hidden;
      z-index: 100;
    }

    .autocomplete-item {
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .autocomplete-item:hover,
    .autocomplete-item.active {
      background: var(--pico-card-sectioning-background-color);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const state = {
      pairs: [],
      show_welcome: true,
      input: '',
      autocomplete: false,
      autocomplete_index: 0,
    };

    const commands = {
      '/help': (input) => {
        state.pairs.unshift({ command: input, response: 'Commands:\n  /help — show this help\n  /clear — clear all messages' });
      },
      '/clear': () => {
        state.pairs = [];
        state.show_welcome = true;
      },
    };

    function filteredCommands() {
      const query = state.input.split(' ')[0].toLowerCase();
      return Object.keys(commands).filter(c => c.startsWith(query));
    }

    function dismissAutocomplete() {
      state.autocomplete = false;
      state.autocomplete_index = 0;
    }

    function selectCommand(cmd) {
      state.input = cmd + ' ';
      dismissAutocomplete();
    }

    function handleInput(e) {
      const val = e.target.value;
      // Space as first character: replace with / and show autocomplete
      if (val === ' ') {
        state.input = '/';
        state.autocomplete = true;
        state.autocomplete_index = 0;
        m.redraw();
        return;
      }
      state.input = val;
      // Show/update autocomplete while typing a command
      if (state.autocomplete || (val.startsWith('/') && val.indexOf(' ') === -1)) {
        state.autocomplete = true;
        state.autocomplete_index = 0;
      } else {
        state.autocomplete = false;
      }
    }

    function handleKeydown(e) {
      if (state.autocomplete) {
        const items = filteredCommands();
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          state.autocomplete_index = (state.autocomplete_index + 1) % items.length;
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          state.autocomplete_index = (state.autocomplete_index - 1 + items.length) % items.length;
          return;
        }
        if (e.key === 'Tab' || e.key === 'Enter') {
          e.preventDefault();
          if (items.length) selectCommand(items[state.autocomplete_index]);
          return;
        }
        if (e.key === 'Escape') {
          dismissAutocomplete();
          return;
        }
        // Second space typed immediately after the first (input is currently '/')
        if (e.key === ' ' && state.input === '/') {
          e.preventDefault();
          state.input = ' ';
          dismissAutocomplete();
          return;
        }
      }
      if (e.key === 'Enter') handleSubmit();
    }

    function handleSubmit() {
      const input = state.input.trim();
      if (!input) return;

      dismissAutocomplete();
      state.show_welcome = false;
      state.input = '';

      if (input.startsWith('/')) {
        const cmd = commands[input.split(' ')[0].toLowerCase()];
        if (cmd) {
          cmd(input);
        } else {
          state.pairs.unshift({ command: input, response: `Unknown command: ${input.split(' ')[0].toLowerCase()}` });
        }
      } else {
        state.pairs.unshift({ command: input, response: 'Note saved.' });
      }
    }

    const App = {
      view() {
        const items = state.autocomplete ? filteredCommands() : [];
        return m('main', [
          m('#input-row', [
            m('#input-wrapper', [
              m('input', {
                type: 'text',
                placeholder: 'Type a note or /command...',
                value: state.input,
                oninput: handleInput,
                onkeydown: handleKeydown,
                autofocus: true,
              }),
              state.autocomplete && items.length
                ? m('#autocomplete', items.map((cmd, i) =>
                    m('.autocomplete-item', {
                      class: i === state.autocomplete_index ? 'active' : '',
                      onmousedown: e => { e.preventDefault(); selectCommand(cmd); },
                    }, cmd)
                  ))
                : null,
            ]),
            m('button', { onclick: handleSubmit }, 'Send'),
          ]),
          state.show_welcome
            ? m('p.muted', { style: 'color: var(--pico-muted-color); font-size: 0.9rem;' }, 'Welcome to snot. Type a note or /help for commands.')
            : null,
          m('#pairs', state.pairs.map((pair, i) =>
            m('.pair', { key: i }, [
              m('.pair-command', pair.command),
              m('.pair-response', pair.response),
            ])
          )),
        ]);
      }
    };

    m.mount(document.getElementById('app'), App);
  </script>
</body>
</html>
