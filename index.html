<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>snot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://cdn.jsdelivr.net/npm/mithril@2/mithril.min.js"></script>
  <style>
    body {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem;
    }

    #messages {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
      min-height: 60vh;
    }

    .message {
      padding: 0.5rem 0.75rem;
      border-radius: 0.375rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--pico-primary-background);
      color: var(--pico-primary-inverse);
    }

    .message.system {
      align-self: flex-start;
      background: var(--pico-card-background-color);
      color: var(--pico-color);
      font-size: 0.9rem;
    }

    #input-row {
      display: flex;
      gap: 0.5rem;
    }

    #input-row input {
      flex: 1;
      margin: 0;
    }

    #input-row button {
      margin: 0;
      width: auto;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const state = {
      messages: [
        { type: 'system', text: 'Welcome to snot. Type a note or /help for commands.' }
      ],
      input: '',
    };

    const commands = {
      '/help': () => {
        addMessage('system', 'Commands:\n  /help — show this help\n  /clear — clear all messages');
      },
      '/clear': () => {
        state.messages = [];
        addMessage('system', 'Cleared.');
      },
    };

    function addMessage(type, text) {
      state.messages.push({ type, text });
    }

    function handleSubmit() {
      const input = state.input.trim();
      if (!input) return;

      addMessage('user', input);
      state.input = '';

      if (input.startsWith('/')) {
        const cmd = commands[input.split(' ')[0]];
        if (cmd) {
          cmd(input);
        } else {
          addMessage('system', `Unknown command: ${input.split(' ')[0]}`);
        }
      } else {
        // plain note — just echoed for now
        addMessage('system', `Note saved.`);
      }
    }

    const App = {
      view() {
        return m('main', [
          m('#messages', state.messages.map((msg, i) =>
            m('.message', { key: i, class: msg.type }, msg.text)
          )),
          m('#input-row', [
            m('input', {
              type: 'text',
              placeholder: 'Type a note or /command...',
              value: state.input,
              oninput: e => { state.input = e.target.value; },
              onkeydown: e => { if (e.key === 'Enter') handleSubmit(); },
              autofocus: true,
            }),
            m('button', { onclick: handleSubmit }, 'Send'),
          ]),
        ]);
      }
    };

    m.mount(document.getElementById('app'), App);
  </script>
</body>
</html>
