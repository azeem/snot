<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>snot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://cdn.jsdelivr.net/npm/mithril@2/mithril.min.js"></script>
  <style>
    body {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem;
      padding-top: 5rem;
      padding-bottom: 70vh;
    }

    #pairs {
      display: flex;
      flex-direction: column;
    }

    #pairs .pair + .pair {
      opacity: var(--older-pair-opacity, 0.35);
      transition: opacity 0.15s;
    }

    .pair-command {
      padding: 0.3rem 1rem;
      margin-left: -1rem;
      margin-right: -1rem;
      font-size: 0.8rem;
      color: var(--pico-muted-color);
      background: color-mix(in srgb, var(--pico-primary-background) 30%, var(--pico-background-color, white));
      border-top: 1px solid var(--pico-muted-border-color);
      border-bottom: 1px solid var(--pico-muted-border-color);
      white-space: pre-line;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }

    .pair-command.expanded {
      display: block;
      -webkit-line-clamp: unset;
      overflow: visible;
      word-break: break-word;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--pico-contrast-background, #333);
      color: var(--pico-contrast-inverse, #fff);
      padding: 0.45rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      z-index: 2000;
      pointer-events: none;
    }

    .pair-response {
      padding: 0.5rem 0;
      padding-bottom: 0.75rem;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
    }

    .help {
      white-space: normal;
      font-size: 0.875rem;
    }

    .help h4 {
      margin: 0.6rem 0 0.3rem;
      font-size: 0.875rem;
    }

    .help h4:first-child {
      margin-top: 0;
    }

    .help ul {
      margin: 0 0 0.5rem;
      padding-left: 1.1rem;
    }

    .help li {
      margin-bottom: 0.2rem;
      line-height: 1.5;
    }

    .help table {
      margin: 0;
      font-size: 0.8rem;
      border-collapse: collapse;
      width: 100%;
    }

    .help th, .help td {
      padding: 0.2rem 0.6rem 0.2rem 0;
      text-align: left;
      vertical-align: top;
      border: none;
    }

    .help th {
      color: var(--pico-muted-color);
      font-weight: 600;
      padding-bottom: 0.3rem;
    }

    .help code {
      font-size: 0.8rem;
      background: var(--pico-code-background, rgba(0,0,0,0.06));
      padding: 0.05rem 0.3rem;
      border-radius: 0.2rem;
    }

    #input-row {
      display: flex;
      gap: 0.5rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      max-width: 720px;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      background: var(--pico-background-color);
      border-bottom: 1px solid var(--pico-muted-border-color);
      z-index: 1000;
    }

    #input-row input {
      flex: 1;
      margin: 0;
    }

    #clear-btn {
      background: none;
      border: none;
      color: var(--pico-muted-color);
      font-size: 1.25rem;
      line-height: 1;
      padding: 0 0.25rem;
      cursor: pointer;
      flex-shrink: 0;
      width: auto;
      margin: 0;
    }

    #clear-btn:hover {
      color: var(--pico-color);
    }

    #input-wrapper {
      flex: 1;
      position: relative;
    }

    #input-wrapper input {
      width: 100%;
    }

    #autocomplete {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--pico-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.5rem;
      overflow: hidden;
      z-index: 100;
    }

    .autocomplete-item {
      padding: 0.65rem 0.75rem;
      cursor: pointer;
      font-size: 1rem;
    }

    .autocomplete-item:hover,
    .autocomplete-item.active {
      background: var(--pico-card-sectioning-background-color);
    }

    .note-item {
      /* spacing between multiple notes */
    }

    .note-item + .note-item {
      margin-top: 0.5rem;
    }

    .note-meta {
      font-size: 0.8rem;
      color: var(--pico-muted-color);
      margin-bottom: 0.15rem;
      padding-left: 0.15rem;
    }

    .note-box {
      background: var(--pico-card-sectioning-background-color);
      border-radius: 0.375rem;
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      user-select: none;
    }

    .note-content {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
      pointer-events: none;
    }

    .note-popup {
      position: fixed;
      background: var(--pico-card-background-color, #fff);
      border: 1px solid var(--pico-muted-border-color, #ccc);
      border-radius: 0.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 0.25rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      min-width: 130px;
    }

    .note-popup-info {
      font-size: 0.75rem;
      color: var(--pico-muted-color);
      padding: 0.3rem 0.5rem 0;
    }
    .note-popup-info + .note-popup-info {
      padding-top: 0;
    }

    .note-popup button {
      margin: 0;
      text-align: left;
      background: none;
      border: none;
      border-radius: 0.35rem;
      padding: 0.4rem 0.75rem;
      width: 100%;
      cursor: pointer;
      color: inherit;
    }

    .note-popup button:hover {
      background: var(--pico-muted-background-color, #f4f4f4);
    }

    .note-state-pill {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.1rem 0.4rem;
      border-radius: 0.25rem;
      background: var(--pill-bg, var(--pico-secondary-background));
      color: var(--pill-color, var(--pico-secondary-inverse));
      margin-right: 0.4rem;
      vertical-align: middle;
      line-height: 1.5;
    }

    .note-state-pill.pill-new {
      --pill-bg: var(--pico-primary-background);
      --pill-color: var(--pico-primary-inverse);
    }

    .note-state-pill.pill-active {
      --pill-bg: #c85000;
      --pill-color: #fff;
    }

    .note-state-pill.pill-success {
      --pill-bg: #1a7f37;
      --pill-color: #fff;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // IndexedDB setup
    const DB_NAME = 'snot';
    const DB_VERSION = 3;
    const STORE_NAME = 'notes';
    const CONFIG_STORE_NAME = 'config';
    let db = null;

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains(STORE_NAME)) {
            d.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
          if (!d.objectStoreNames.contains(CONFIG_STORE_NAME)) {
            d.createObjectStore(CONFIG_STORE_NAME, { keyPath: 'key' });
          }
        };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
      });
    }

    function dbPut(note) {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(note);
    }

    function dbDelete(id) {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).delete(id);
    }

    function dbGetAll() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).getAll();
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
      });
    }

    function dbConfigPut(key, value) {
      const tx = db.transaction(CONFIG_STORE_NAME, 'readwrite');
      tx.objectStore(CONFIG_STORE_NAME).put({ key, value });
    }

    function dbConfigDelete(key) {
      const tx = db.transaction(CONFIG_STORE_NAME, 'readwrite');
      tx.objectStore(CONFIG_STORE_NAME).delete(key);
    }

    function dbConfigGetAll() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(CONFIG_STORE_NAME, 'readonly');
        const req = tx.objectStore(CONFIG_STORE_NAME).getAll();
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
      });
    }

    const CONFIG_DEFAULTS = { 'list-limit': 10, 'startup': '/list', 'state-names': 'INBOX,TODO,DONE,ARCHIVE', 'default-state': 'NULL', 'new-state': 'INBOX', 'active-state': 'TODO', 'success-state': 'DONE' };
    const userConfig = {};

    const state = {
      pairs: [],
      notes: [],
      show_welcome: true,
      input: '',
      autocomplete: false,
      autocomplete_index: 0,
      note_menu: null,
      collapsing: null,
      toast: null,
    };

    let _toastTimer = null;
    function showToast(msg) {
      state.toast = msg;
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => { state.toast = null; m.redraw(); }, 3000);
      m.redraw();
    }

    function formatNoteDate(ts) {
      const d = new Date(ts);
      const M = d.getMonth() + 1;
      const D = d.getDate();
      const H = d.getHours();
      const min = String(d.getMinutes()).padStart(2, '0');
      const hhmm = `${H}${min}`;
      if (d.getFullYear() === new Date().getFullYear()) {
        return `${M}/${D} ${hhmm}`;
      }
      return `${d.getFullYear()}/${M}/${D} ${hhmm}`;
    }

    function generateUUID() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return '10000000-1000-4000-8000-100000000000'.replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
      );
    }

    function getStateNames() {
      const raw = userConfig['state-names'] !== undefined ? userConfig['state-names'] : CONFIG_DEFAULTS['state-names'];
      return raw.split(',').map(s => s.trim().toUpperCase()).filter(s => s && s !== 'NULL');
    }

    function getDefaultStateIndex() {
      const def = ((userConfig['default-state'] !== undefined ? userConfig['default-state'] : CONFIG_DEFAULTS['default-state']) + '').toUpperCase();
      if (def === 'NULL') return null;
      const names = getStateNames();
      const idx = names.indexOf(def);
      return idx === -1 ? null : idx;
    }

    function getStateName(stateIdx) {
      if (stateIdx === null || stateIdx === undefined) return null;
      const names = getStateNames();
      return names[stateIdx] !== undefined ? names[stateIdx] : null;
    }

    function getNextStateArg(note) {
      const names = getStateNames();
      if (!names.length) return null;
      const cur = note.state;
      if (cur === null || cur === undefined) return '/' + names[0];
      if (cur >= names.length - 1) return '/NULL';
      return '/' + names[cur + 1];
    }

    function getStatePillClass(stateName) {
      if (!stateName) return '';
      const upper = stateName.toUpperCase();
      const get = k => ((userConfig[k] !== undefined ? userConfig[k] : CONFIG_DEFAULTS[k]) + '').toUpperCase();
      if (upper === get('new-state')) return 'pill-new';
      if (upper === get('active-state')) return 'pill-active';
      if (upper === get('success-state')) return 'pill-success';
      return '';
    }

    function createNote(content) {
      return { id: generateUUID(), content, created_at: Date.now(), state: getDefaultStateIndex() };
    }

    function handleNote(input, displayCommand) {
      const content = input.trim();
      if (!content) {
        state.pairs.unshift({ pairId: generateUUID(), command: displayCommand, response: { type: 'text', content: 'Usage: /note <text>' } });
        return;
      }
      const note = createNote(content);
      state.notes.push(note);
      state.pairs.unshift({ pairId: generateUUID(), command: displayCommand, response: { type: 'notes', notes: [note] } });
      if (db) dbPut(note);
    }

    function buildHelpMarkup() {
      const c = text => m('code', text);
      const row = (key, def, desc) => m('tr', [m('td', c(key)), m('td', c(def)), m('td', desc)]);
      return m('.help', [
        m('h4', 'Commands'),
        m('ul', [
          m('li', [c('/note'), ' ', c('[/id:<id>] [/<state>|/NULL] [<text>]'), ' — create a note or edit one by id; include a state arg to set/clear state']),
          m('li', [c('/list'), ' ', c('[/limit:<n>] [/offset:<n>]'), ' — list most recent notes']),
          m('li', [c('/delete'), ' ', c('/id:<id> …'), ' — remove one or more notes']),
          m('li', [c('/config'), ' ', c('[/key:value …]'), ' — view or set configuration']),
          m('li', [c('/clear'), ' — clear all messages']),
          m('li', [c('/help'), ' — show this help']),
        ]),
        m('h4', 'Configuration'),
        m('table', [
          m('thead', m('tr', [m('th', 'Key'), m('th', 'Default'), m('th', 'Description')])),
          m('tbody', [
            row('list-limit', '10', 'Max notes returned by /list'),
            row('startup', '/list', 'Command run at startup'),
            row('state-names', 'INBOX,TODO,DONE,ARCHIVE', 'Comma-separated state enumeration'),
            row('default-state', 'NULL', 'State assigned to new notes'),
            row('new-state', 'INBOX', 'State name with primary-color pill'),
            row('active-state', 'TODO', 'State name with orange pill'),
            row('success-state', 'DONE', 'State name with green pill'),
          ]),
        ]),
      ]);
    }

    const commands = {
      '/help': (input) => {
        state.pairs.unshift({ pairId: generateUUID(), command: input, response: { type: 'markup', content: buildHelpMarkup() } });
      },
      '/clear': () => {
        state.pairs = [];
        state.show_welcome = true;
      },
      '/note': (input, collapseCtx) => {
        const args = {};
        input.replace(/\/(\w[^:\s]*):(\S+)/g, (_, k, v) => { args[k] = v; });
        // Parse state args: /STATENAME or /NULL (no colon, after command)
        const stateNames = getStateNames();
        let newState = undefined; // undefined = don't change
        const inputAfterCmd = input.replace(/^\/note\s*/i, '');
        inputAfterCmd.replace(/\/([A-Za-z][A-Za-z0-9]*)(?=\s|$)/g, (_, name) => {
          const upper = name.toUpperCase();
          if (upper === 'NULL') {
            newState = null;
          } else {
            const idx = stateNames.indexOf(upper);
            if (idx !== -1) newState = idx;
          }
        });
        // Build state pattern to strip from text
        const statePattern = new RegExp('\\/(?:NULL|' + (stateNames.length ? stateNames.join('|') : 'XNOMATCH') + ')(?=\\s|$)\\s*', 'gi');
        const text = inputAfterCmd.replace(/\/\w[^:\s]*:\S+\s*/g, '').replace(statePattern, '').trim();
        if (args.id) {
          const note = state.notes.find(n => n.id.startsWith(args.id));
          if (!note) {
            if (collapseCtx) { showToast(`No note found with id: ${args.id}`); return; }
            state.pairs.unshift({ pairId: generateUUID(), command: input, response: { type: 'text', content: `No note found with id: ${args.id}` } });
            return;
          }
          if (text) note.content = text;
          if (newState !== undefined) note.state = newState;
          if (collapseCtx) {
            const pair = state.pairs[collapseCtx.pairIdx];
            if (pair) {
              pair.command = input + '\n' + pair.command;
              state.pairs.splice(collapseCtx.pairIdx, 1);
              state.pairs.unshift(pair);
            }
          } else {
            state.pairs.unshift({ pairId: generateUUID(), command: input, response: { type: 'notes', notes: [note] } });
          }
          if (db) dbPut(note);
        } else {
          handleNote(text, input);
        }
      },
      '/list': (input) => {
        const args = {};
        input.replace(/\/(\w+):(\S+)/g, (_, k, v) => { args[k] = v; });
        const defaultLimit = userConfig['list-limit'] !== undefined ? userConfig['list-limit'] : CONFIG_DEFAULTS['list-limit'];
        const limit = Math.max(1, parseInt(args.limit) || defaultLimit);
        const offset = Math.max(0, parseInt(args.offset) || 0);
        const all = state.notes.slice().reverse();
        const notes = all.slice(offset, offset + limit);
        if (!all.length) {
          state.pairs.unshift({ pairId: generateUUID(), command: input, response: { type: 'text', content: 'No notes yet.' } });
        } else if (!notes.length) {
          state.pairs.unshift({ pairId: generateUUID(), command: input, response: { type: 'text', content: `No notes at offset ${offset}.` } });
        } else {
          state.pairs.unshift({ pairId: generateUUID(), command: input, response: { type: 'notes', notes } });
        }
      },
      '/config': (input) => {
        const args = {};
        input.replace(/\/(\w[^:\s]*):"([^"]*)"/g, (_, k, v) => { args[k] = v; });
        input.replace(/\/(\w[^:\s]*):([^"\/\s]\S*)/g, (_, k, v) => { if (!(k in args)) args[k] = v; });
        const keys = Object.keys(args).filter(k => k !== 'config');
        if (!keys.length) {
          const lines = Object.keys(CONFIG_DEFAULTS).map(k => {
            const val = userConfig[k] !== undefined ? userConfig[k] : CONFIG_DEFAULTS[k];
            const tag = userConfig[k] !== undefined ? '' : ' (default)';
            return `  ${k}: ${val}${tag}`;
          });
          state.pairs.unshift({ pairId: generateUUID(), command: input, response: { type: 'text', content: 'Configuration:\n' + lines.join('\n') } });
          return;
        }
        const results = [];
        for (const k of keys) {
          if (k === 'reset') {
            const name = args[k];
            if (!(name in CONFIG_DEFAULTS)) {
              results.push(`Unknown config key: ${name}`);
            } else {
              delete userConfig[name];
              if (db) dbConfigDelete(name);
              results.push(`${name} reset to default (${CONFIG_DEFAULTS[name]})`);
            }
            continue;
          }
          if (!(k in CONFIG_DEFAULTS)) {
            results.push(`Unknown config key: ${k}`);
            continue;
          }
          if (k === 'startup') {
            userConfig[k] = args[k];
            if (db) dbConfigPut(k, args[k]);
            results.push(`${k} set to ${args[k]}`);
            continue;
          }
          if (k === 'state-names') {
            const parts = args[k].split(',').map(s => s.trim().toUpperCase()).filter(Boolean);
            if (parts.includes('NULL')) {
              results.push(`Invalid value for state-names: NULL is not allowed as a state name`);
              continue;
            }
            if (!parts.length) {
              results.push(`Invalid value for state-names: must have at least one name`);
              continue;
            }
            const val = parts.join(',');
            userConfig[k] = val;
            if (db) dbConfigPut(k, val);
            results.push(`${k} set to ${val}`);
            continue;
          }
          if (k === 'default-state' || k === 'new-state' || k === 'active-state' || k === 'success-state') {
            const val = args[k].toUpperCase();
            userConfig[k] = val;
            if (db) dbConfigPut(k, val);
            results.push(`${k} set to ${val}`);
            continue;
          }
          const parsed = parseInt(args[k]);
          if (isNaN(parsed) || parsed < 1) {
            results.push(`Invalid value for ${k}: ${args[k]}`);
            continue;
          }
          userConfig[k] = parsed;
          if (db) dbConfigPut(k, parsed);
          results.push(`${k} set to ${parsed}`);
        }
        state.pairs.unshift({ pairId: generateUUID(), command: input, response: { type: 'text', content: results.join('\n') } });
      },
      '/delete': (input, collapseCtx) => {
        const ids = [];
        input.replace(/\/id:(\S+)/g, (_, v) => ids.push(v));
        if (!ids.length) {
          if (collapseCtx) { showToast('Usage: /delete /id:<id> [/id:<id> ...]'); return; }
          state.pairs.unshift({ pairId: generateUUID(), command: input, response: { type: 'text', content: 'Usage: /delete /id:<id> [/id:<id> ...]' } });
          return;
        }
        const removed = [];
        const notFound = [];
        for (const shortId of ids) {
          const idx = state.notes.findIndex(n => n.id.startsWith(shortId));
          if (idx === -1) { notFound.push(shortId); continue; }
          const [note] = state.notes.splice(idx, 1);
          removed.push(note);
          if (db) dbDelete(note.id);
        }
        if (collapseCtx) {
          if (notFound.length) { showToast(`Not found: ${notFound.join(', ')}`); return; }
          const pair = state.pairs[collapseCtx.pairIdx];
          if (pair && pair.response.type === 'notes') {
            pair.command = input + '\n' + pair.command;
            const removedIds = new Set(removed.map(n => n.id));
            pair.response.notes = pair.response.notes.filter(n => !removedIds.has(n.id));
            if (pair.response.notes.length === 0) {
              state.pairs.splice(collapseCtx.pairIdx, 1);
            }
          } else if (pair) {
            state.pairs.splice(collapseCtx.pairIdx, 1);
          }
          return;
        }
        const lines = [];
        if (removed.length) lines.push(`Deleted ${removed.length} note${removed.length > 1 ? 's' : ''}: ${removed.map(n => n.id.slice(0, 7)).join(', ')}`);
        if (notFound.length) lines.push(`Not found: ${notFound.join(', ')}`);
        state.pairs.unshift({ pairId: generateUUID(), command: input, response: { type: 'text', content: lines.join('\n') } });
      },
    };

    const commandArgs = {
      '/list': ['/limit', '/offset'],
      '/delete': ['/id'],
    };

    function getNoteArgs() {
      return ['/id', '/NULL', ...getStateNames().map(n => '/' + n)];
    }

    function getConfigArgs() {
      return ['/list-limit', '/startup', '/reset', '/state-names', '/default-state', '/new-state', '/active-state', '/success-state'];
    }

    function isArgMode() {
      const val = state.input;
      if (!val.includes(' ')) return false;
      const lastToken = val.split(' ').pop();
      return lastToken.startsWith('/') && !lastToken.includes(':');
    }

    function filteredCommands() {
      if (isArgMode()) {
        const parts = state.input.split(' ');
        const cmdKey = parts[0].toLowerCase();
        const lastToken = parts[parts.length - 1];
        const usedArgs = parts.slice(1, -1).filter(p => p.startsWith('/') && p.includes(':')).map(p => p.split(':')[0]);
        let argList;
        if (cmdKey === '/note') argList = getNoteArgs();
        else if (cmdKey === '/config') argList = getConfigArgs();
        else argList = commandArgs[cmdKey] || [];
        return argList.filter(a => a.startsWith(lastToken) && !usedArgs.includes(a));
      }
      const query = state.input.split(' ')[0].toLowerCase();
      return Object.keys(commands).filter(c => c.startsWith(query));
    }

    function dismissAutocomplete() {
      state.autocomplete = false;
      state.autocomplete_index = 0;
    }

    function selectCommand(item) {
      if (isArgMode()) {
        const parts = state.input.split(' ');
        const noValueArgs = new Set(['/NULL', ...getStateNames().map(n => '/' + n)]);
        const suffix = noValueArgs.has(item.toUpperCase()) ? ' ' : ':';
        parts[parts.length - 1] = item + suffix;
        state.input = parts.join(' ');
      } else {
        state.input = item + ' ';
      }
      dismissAutocomplete();
    }

    function handleInput(e) {
      const val = e.target.value;
      // Space as first character: replace with / and show autocomplete
      if (val === ' ') {
        state.input = '/';
        state.autocomplete = true;
        state.autocomplete_index = 0;
        m.redraw();
        return;
      }
      state.input = val;
      // Clear collapsing tag if user deletes back to bare command word (no space = no args)
      if (state.collapsing && !val.includes(' ')) {
        state.collapsing = null;
      }
      // Show/update autocomplete while typing a command or argument
      const parts = val.split(' ');
      const lastToken = parts[parts.length - 1];
      const inArgMode = val.startsWith('/') && parts.length > 1 && lastToken.startsWith('/') && !lastToken.includes(':');
      if ((val.startsWith('/') && val.indexOf(' ') === -1) || inArgMode) {
        state.autocomplete = true;
        state.autocomplete_index = 0;
      } else {
        state.autocomplete = false;
      }
    }

    function handleKeydown(e) {
      if (state.autocomplete) {
        const items = filteredCommands();
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          state.autocomplete_index = (state.autocomplete_index + 1) % items.length;
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          state.autocomplete_index = (state.autocomplete_index - 1 + items.length) % items.length;
          return;
        }
        if (e.key === 'Tab' || e.key === 'Enter') {
          e.preventDefault();
          if (items.length) selectCommand(items[state.autocomplete_index]);
          return;
        }
        if (e.key === 'Escape') {
          dismissAutocomplete();
          return;
        }
        // Second space typed immediately after the first (input is currently '/')
        if (e.key === ' ' && state.input === '/') {
          e.preventDefault();
          state.input = ' ';
          dismissAutocomplete();
          return;
        }
      }
      if (e.key === 'Enter') { e.target.blur(); handleSubmit(); }
    }

    function handleSubmit() {
      const input = state.input.trim().replace(/[\u201C\u201D]/g, '"');
      if (!input) return;

      const collapseCtx = state.collapsing;
      dismissAutocomplete();
      state.show_welcome = false;
      state.input = '';
      state.collapsing = null;

      if (input.startsWith('/')) {
        const cmdKey = input.split(' ')[0].toLowerCase();
        const cmd = commands[cmdKey];
        if (cmd) {
          cmd(input, collapseCtx);
        } else {
          if (collapseCtx) {
            showToast(`Unknown command: ${cmdKey}`);
          } else {
            state.pairs.unshift({ pairId: generateUUID(), command: input, response: { type: 'text', content: `Unknown command: ${cmdKey}` } });
          }
        }
      } else {
        handleNote(input, '/note ' + input);
      }
    }

    function renderResponse(response, pairIdx) {
      if (!response || typeof response === 'string') return response;
      if (response.type === 'text') return response.content;
      if (response.type === 'markup') return response.content;
      if (response.type === 'notes') {
        return response.notes.map(note => {
          const live = state.notes.find(n => n.id === note.id);
          const menuKey = `${pairIdx}_${note.id}`;
          const menuOpen = state.note_menu && state.note_menu.key === menuKey;
          const stateName = live ? getStateName(live.state) : getStateName(note.state);
          return m('.note-item', [
            m('.note-box', {
              onclick: live ? (e) => {
                e.stopPropagation();
                if (menuOpen) { state.note_menu = null; return; }
                const rect = e.currentTarget.getBoundingClientRect();
                state.note_menu = { key: menuKey, noteId: note.id, createdAt: note.created_at, right: window.innerWidth - rect.right, top: rect.top, pairIdx };
              } : undefined,
              style: live ? '' : 'cursor: default',
            }, [
              stateName ? m('span.note-state-pill' + (getStatePillClass(stateName) ? '.' + getStatePillClass(stateName) : ''), stateName) : null,
              m('.note-content', { style: stateName ? 'display: inline' : '' }, (live ? live.content : note.content)),
            ]),
          ]);
        });
      }
    }

    const App = {
      oncreate() {
        document.addEventListener('click', () => {
          if (state.note_menu) { state.note_menu = null; m.redraw(); }
        });
      },
      view() {
        const items = state.autocomplete ? filteredCommands() : [];
        const menu = state.note_menu;
        const menuNote = menu && state.notes.find(n => n.id === menu.noteId);
        return m('main', [
          m('#input-row', [
            m('#input-wrapper', [
              m('input', {
                type: 'text',
                placeholder: 'Type a note or /command...',
                value: state.input,
                oninput: handleInput,
                onkeydown: handleKeydown,
                autofocus: true,
              }),
              state.autocomplete && items.length
                ? m('#autocomplete', items.map((cmd, i) =>
                    m('.autocomplete-item', {
                      class: i === state.autocomplete_index ? 'active' : '',
                      onmousedown: e => { e.preventDefault(); selectCommand(cmd); },
                    }, cmd)
                  ))
                : null,
            ]),
            state.input ? m('button#clear-btn', {
              onmousedown: e => e.preventDefault(),
              onclick: () => {
                state.input = '';
                state.collapsing = null;
                dismissAutocomplete();
                document.querySelector('#input-row input').focus();
              },
            }, '×') : null,
          ]),
          state.show_welcome
            ? m('p.muted', { style: 'color: var(--pico-muted-color); font-size: 0.9rem;' }, 'Welcome to snot. Type a note or /help for commands.')
            : null,
          m('#pairs', state.pairs.map((pair, i) =>
            m('.pair', { key: i, id: 'p-' + pair.pairId }, [
              m('.pair-command', {
                class: pair.expanded ? 'expanded' : '',
                onclick: () => { pair.expanded = !pair.expanded; },
              }, pair.command),
              m('.pair-response', renderResponse(pair.response, i)),
            ])
          )),
          state.toast ? m('.toast', state.toast) : null,
          menuNote ? m('.note-popup', {
            style: `right: ${menu.right}px; top: ${menu.top}px;`,
            onclick: e => e.stopPropagation(),
          }, [
            m('.note-popup-info', `id: ${menuNote.id.slice(0, 7)}`),
            m('.note-popup-info', `created: ${formatNoteDate(menu.createdAt)}`),
            m('button', {
              onclick: () => {
                state.input = `/note /id:${menuNote.id.slice(0, 7)} ${menuNote.content}`;
                state.collapsing = { pairIdx: menu.pairIdx };
                state.note_menu = null;
                const inp = document.querySelector('#input-row input');
                if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
              },
            }, 'Edit'),
            (() => {
              const nextArg = getNextStateArg(menuNote);
              if (!nextArg) return null;
              const label = nextArg.slice(1); // remove leading /
              return m('button', {
                onclick: () => {
                  state.input = `/note /id:${menuNote.id.slice(0, 7)} ${nextArg}`;
                  state.collapsing = { pairIdx: menu.pairIdx };
                  state.note_menu = null;
                  const inp = document.querySelector('#input-row input');
                  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
                },
              }, label);
            })(),
            m('button', {
              onclick: () => {
                state.input = `/delete /id:${menuNote.id.slice(0, 7)}`;
                state.collapsing = { pairIdx: menu.pairIdx };
                state.note_menu = null;
                const inp = document.querySelector('#input-row input');
                if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
              },
            }, 'Delete'),
          ]) : null,
        ]);
      }
    };

    m.mount(document.getElementById('app'), App);

    openDB().then(database => {
      db = database;
      return Promise.all([dbGetAll(), dbConfigGetAll()]);
    }).then(([notes, configRows]) => {
      state.notes = notes.sort((a, b) => a.created_at - b.created_at);
      configRows.forEach(row => { userConfig[row.key] = row.value; });
      const startupCmd = userConfig['startup'] !== undefined ? userConfig['startup'] : CONFIG_DEFAULTS['startup'];
      if (startupCmd) {
        state.show_welcome = false;
        const cmdKey = startupCmd.split(' ')[0].toLowerCase();
        const cmd = commands[cmdKey];
        if (cmd) cmd(startupCmd, null);
      }
      m.redraw();
    }).catch(err => console.error('IndexedDB error:', err));

    function updateFadeOpacity() {
      const firstPair = document.querySelector('#pairs .pair');
      const pairsEl = document.getElementById('pairs');
      const inputRow = document.getElementById('input-row');
      if (!firstPair || !pairsEl) return;
      const rect = firstPair.getBoundingClientRect();
      const inputRowHeight = inputRow ? inputRow.getBoundingClientRect().height : 0;
      // visibleRatio: 1 when fully below the input row, 0 when fully scrolled behind it
      const visibleRatio = Math.max(0, Math.min(1, (rect.bottom - inputRowHeight) / rect.height));
      const opacity = 0.35 + (1 - visibleRatio) * 0.65;
      pairsEl.style.setProperty('--older-pair-opacity', opacity);
    }

    document.addEventListener('click', () => {
      if (state.note_menu) { state.note_menu = null; m.redraw(); }
    });

    window.addEventListener('scroll', updateFadeOpacity, { passive: true });
    // Re-run after Mithril redraws so the first pair element exists
    const _redraw = m.redraw;
    m.redraw = function() { _redraw.apply(this, arguments); requestAnimationFrame(updateFadeOpacity); };
  </script>
</body>
</html>
