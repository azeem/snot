<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>snot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://cdn.jsdelivr.net/npm/mithril@2/mithril.min.js"></script>
  <style>
    body {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem;
      padding-top: 5rem;
    }

    #pairs {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .pair {
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.5rem;
      overflow: hidden;
    }

    .pair-command {
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      color: var(--pico-muted-color);
      border-bottom: 1px solid var(--pico-muted-border-color);
      background: var(--pico-card-sectioning-background-color);
    }

    .pair-response {
      padding: 0.5rem 0.75rem;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
    }

    #input-row {
      display: flex;
      gap: 0.5rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      max-width: 720px;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      background: var(--pico-background-color);
      border-bottom: 1px solid var(--pico-muted-border-color);
    }

    #input-row input {
      flex: 1;
      margin: 0;
    }

    #input-row button {
      margin: 0;
      width: auto;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const state = {
      pairs: [],
      welcomed: true,
      input: '',
    };

    const commands = {
      '/help': (input) => {
        state.pairs.unshift({ command: input, response: 'Commands:\n  /help — show this help\n  /clear — clear all messages' });
      },
      '/clear': (input) => {
        state.pairs = [];
        state.pairs.unshift({ command: input, response: 'Cleared.' });
      },
    };

    function handleSubmit() {
      const input = state.input.trim();
      if (!input) return;

      state.welcomed = false;
      state.input = '';

      if (input.startsWith('/')) {
        const cmd = commands[input.split(' ')[0]];
        if (cmd) {
          cmd(input);
        } else {
          state.pairs.unshift({ command: input, response: `Unknown command: ${input.split(' ')[0]}` });
        }
      } else {
        state.pairs.unshift({ command: input, response: 'Note saved.' });
      }
    }

    const App = {
      view() {
        return m('main', [
          m('#input-row', [
            m('input', {
              type: 'text',
              placeholder: 'Type a note or /command...',
              value: state.input,
              oninput: e => { state.input = e.target.value; },
              onkeydown: e => { if (e.key === 'Enter') handleSubmit(); },
              autofocus: true,
            }),
            m('button', { onclick: handleSubmit }, 'Send'),
          ]),
          state.welcomed
            ? m('p.muted', { style: 'color: var(--pico-muted-color); font-size: 0.9rem;' }, 'Welcome to snot. Type a note or /help for commands.')
            : null,
          m('#pairs', state.pairs.map((pair, i) =>
            m('.pair', { key: i }, [
              m('.pair-command', pair.command),
              m('.pair-response', pair.response),
            ])
          )),
        ]);
      }
    };

    m.mount(document.getElementById('app'), App);
  </script>
</body>
</html>
